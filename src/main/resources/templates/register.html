<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silph Engine - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login-register.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 56px);">
    <div class="row justify-content-center" style="width: 100%;">
        <div class="col-md-5">
            <div class="card auth-card shadow-lg p-4 rounded-3">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-warning">Create Account</h2>
                </div>

                <div th:if="${businessError}" class="alert alert-danger text-center py-2 small" role="alert" th:text="${businessError}"></div>

                <form th:action="@{/register}" th:object="${userRequest}" method="post" novalidate class="auth-form">

                    <div class="mb-3">
                        <label for="nickname" class="form-label text-warning">Username</label>
                        <input type="text" th:field="*{nickname}" id="nickname"
                               class="form-control" th:classappend="${#fields.hasErrors('nickname')} ? 'is-invalid'" placeholder="TrainerName">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-warning">Email Address</label>
                        <input type="email" th:field="*{email}" id="email"
                               class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="trainer@silph.com">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-warning">Password</label>
                        <input type="password" th:field="*{password}" id="password"
                               class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="••••••••">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-warning fw-bold py-2 shadow-sm">Register</button>
                    </div>

                    <div class="text-center">
                        <span class="text-white-50 small">Already have an account? </span>
                        <a th:href="@{/login}" class="link-warning small text-decoration-none fw-bold">Sign In</a>
                    </div>
                </form>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-white-50 small text-decoration-none">← Return to homepage</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
