<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silph Engine - My Decks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/decks.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-bold text-light mb-1">My Decks</h1>
        </div>
        <form th:action="@{/decks/new}" method="post" class="m-0">
            <button type="submit" class="btn btn-warning fw-bold text-dark px-4 shadow-sm">
                + Create New Deck
            </button>
        </form>
    </div>

    <div th:if="${decks.isEmpty()}" class="alert alert-secondary bg-dark border-secondary text-white-50 text-center py-5" role="alert">
        <h4 class="text-light fw-bold mb-2">No decks found</h4>
        <p class="mb-0">You haven't built any decks yet.</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:unless="${decks.isEmpty()}">
        <div class="col" th:each="deck : ${decks}">
            <div class="card h-100 p-3 rounded-3 card-deck shadow-sm">

                <div class="card-body d-flex flex-column p-2">
                    <h5 class="card-title deck-title mb-2" th:text="${deck.name}">Standard Aggro</h5>

                    <div class="d-flex align-items-center gap-2 mb-4">
                       <span class="badge bg-dark border border-secondary text-light px-2.5 py-1.5"
                             th:text="${#aggregates.sum(deck.cards.![quantity]) ?: 0} + ' / 60 Cards'">
                            0 / 60 Cards
                        </span>

                        <span th:if="${deck.isLegal}" class="badge bg-success text-dark fw-bold px-2.5 py-1.5">
                            Standard Legal
                        </span>
                        <span th:unless="${deck.isLegal}" class="badge bg-secondary text-white-50 px-2.5 py-1.5">
                            Not Legal
                        </span>
                    </div>

                    <div class="d-flex gap-2 mt-auto">
                        <a th:href="@{/decks/{id}/build(id=${deck.id})}" class="btn btn-sm btn-outline-warning w-100 fw-bold py-2">
                            Open Builder &rarr;
                        </a>

                        <form th:action="@{/decks/{id}/delete(id=${deck.id})}" method="post" class="m-0"
                              onsubmit="return confirm('Are you sure you want to delete this deck? This action cannot be undone.');">
                            <button type="submit" class="btn btn-sm btn-outline-danger py-2 px-3" title="Delete Deck">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash-fill" viewBox="0 0 16 16">
                                    <path d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5M8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5m3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0"/>
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pager(${page}, ${baseUrl}, null, 'justify-content-center mt-5')}"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
